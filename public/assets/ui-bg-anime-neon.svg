<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="blueCore" cx="45%" cy="45%" r="75%">
      <stop offset="0" stop-color="#0b2b61" stop-opacity="0.92"/>
      <stop offset="0.48" stop-color="#061634" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#01040c" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="yellowBeam" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#fff063" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#ffd000" stop-opacity="0.68"/>
      <stop offset="0.54" stop-color="#ff9f00" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffea00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanBeam" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00f6ff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#00f6ff" stop-opacity="0.72"/>
      <stop offset="0.58" stop-color="#53ffff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#00d5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pinkBeam" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2edb" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff2edb" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9a4cff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#99baff" opacity="0.16"/>
    </pattern>
    <pattern id="lineGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#68a6ff" stroke-width="1" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#blueCore)"/>
  <rect width="1920" height="1080" fill="url(#lineGrid)"/>
  <rect width="1920" height="1080" fill="url(#dotGrid)" opacity="0.78"/>

  <g filter="url(#blurGlow)">
    <path d="M-90 840 L310 -120 L420 -120 L20 900 Z" fill="url(#yellowBeam)" opacity="0.92"/>
    <path d="M75 790 L535 -130 L680 -130 L214 860 Z" fill="url(#cyanBeam)" opacity="0.68"/>
    <path d="M1300 1110 L1755 120 L1818 120 L1368 1110 Z" fill="url(#pinkBeam)" opacity="0.72"/>
    <path d="M1545 1120 L1970 390 L2035 400 L1610 1120 Z" fill="url(#pinkBeam)" opacity="0.44"/>
  </g>

  <g opacity="0.19" filter="url(#softBlur)">
    <path d="M0 1030 C72 870 105 690 78 540 C135 592 186 610 246 596 C225 538 230 480 276 417 C315 487 366 537 447 552 C395 591 371 658 386 754 C310 709 245 714 190 766 C160 858 100 944 0 1030Z" fill="#8fb6ff"/>
    <path d="M1510 950 C1455 774 1478 626 1584 508 C1562 600 1605 674 1695 725 C1692 623 1733 535 1822 461 C1819 577 1856 676 1940 757 L1940 1080 L1510 1080Z" fill="#a67cff"/>
  </g>

  <g opacity="0.09">
    <path d="M158 812 C256 684 330 620 428 610" fill="none" stroke="#d8e8ff" stroke-width="3"/>
    <path d="M1633 835 C1720 730 1815 652 1910 606" fill="none" stroke="#f5d8ff" stroke-width="3"/>
    <circle cx="250" cy="675" r="52" fill="none" stroke="#d8e8ff" stroke-width="2"/>
    <circle cx="1750" cy="650" r="64" fill="none" stroke="#f5d8ff" stroke-width="2"/>
  </g>

  <g opacity="0.36">
    <path d="M80 0H1840" stroke="#00e7ff" stroke-width="1" opacity="0.12"/>
    <path d="M160 1080H1760" stroke="#ff2edb" stroke-width="1" opacity="0.1"/>
    <path d="M0 565H500" stroke="#00e7ff" stroke-width="2" opacity="0.08"/>
    <path d="M1380 300H1920" stroke="#ff2edb" stroke-width="2" opacity="0.08"/>
  </g>
</svg>
